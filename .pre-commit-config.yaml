# 커밋 전 로컬 검사 — CI와 같은 검사를 푸시 전에 미리 잡는다.
# 설치: pip install -r requirements-dev.txt && pre-commit install
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files # 가중치(.onnx/.tflite) 실수 커밋 차단
        args: ["--maxkb=1024"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff

  - repo: local
    hooks:
      - id: protocol-sync
        name: protocol.py ↔ protocol.h 상수 일치 검사
        entry: python3 scripts/check_protocol_sync.py
        language: system
        files: ^shared/protocol/
        pass_filenames: false
      - id: docs-links
        name: 마크다운 상대 링크 검사
        entry: python3 scripts/check_links.py
        language: system
        types: [markdown]
        pass_filenames: false
